<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Администратора</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #888);
            --button: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --danger: #e53935;
            --success: #4caf50;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; }
        .nav-buttons { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
        .nav-btn { background: var(--secondary-bg); color: var(--text); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .nav-btn.active { background: var(--button); color: var(--button-text); }
        .section { display: none; }
        .section.active { display: block; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--secondary-bg); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 12px; color: var(--hint); }
        .stat-card p { margin: 4px 0 0; font-size: 18px; font-weight: bold; }
        .btn { background: var(--button); color: var(--button-text); border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: 600; }
        .list-item { background: var(--secondary-bg); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 10px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; }
        .list-item-title { font-weight: bold; font-size: 14px; }
        .list-item-subtitle { font-size: 12px; color: var(--hint); }
        .alert { padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 5px; border: 1px solid transparent; }
        .alert-danger { background: #ffebee; color: #c62828; border-color: #ffcdd2; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: var(--hint); margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .action-btn { background: var(--bg); border: 1px solid var(--hint); color: var(--text); padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .action-btn.danger { border-color: var(--danger); color: var(--danger); }
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 30px; }
        .check-row { display: flex; gap: 12px; font-size: 13px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="loading-overlay">⌛</div>
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="switchSection('dashboard', this)">Дашборд</button>
        <button class="nav-btn" onclick="switchSection('resources', this)">Ресурсы</button>
        <button class="nav-btn" onclick="switchSection('tariffs', this)">Тарифы</button>
        <button class="nav-btn" onclick="switchSection('users', this)">Пользователи</button>
        <button class="nav-btn" onclick="switchSection('broadcast', this)">Рассылка</button>
        <button class="nav-btn" onclick="switchSection('settings', this)">Настройки</button>
    </div>

    <div id="section-dashboard" class="section active">
        <h2>Дашборд</h2>
        <div class="dashboard">
            <div class="stat-card"><h3>Доход (мес)</h3><p id="stat-revenue">0 ₽</p></div>
            <div class="stat-card"><h3>Новые юзеры</h3><p id="stat-new-users">0</p></div>
            <div class="stat-card"><h3>Активные</h3><p id="stat-active">0</p></div>
            <div class="stat-card"><h3>Всего</h3><p id="stat-total">0</p></div>
        </div>
        <button class="btn" onclick="runAction('export_csv')">Выгрузить CSV</button>
    </div>

    <div id="section-resources" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Ресурсы</h2>
            <button class="nav-btn active" onclick="runAction('sync_resources')">Обновить 🔄</button>
        </div>

        <div class="stat-card" style="margin-bottom:15px; text-align:left;">
            <label>Добавить по ID</label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="add-chat-id" placeholder="-100XXXXXXXXXX" style="flex:1;">
                <button class="nav-btn active" style="padding:0 15px;" onclick="addResource()">+</button>
            </div>
        </div>

        <div id="resources-list"></div>
    </div>

    <div id="section-tariffs" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Тарифы</h2><button class="nav-btn active" onclick="openTariffForm()">+</button>
        </div>
        <div id="tariffs-list"></div>
        <div id="tariff-form" style="display:none; border-top: 1px solid #ccc; padding-top: 10px;">
            <input type="hidden" id="f-id">
            <div class="form-group"><label>Название</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Цена</label><input type="number" id="f-price"></div>
            <div class="form-group"><label>Дней</label><input type="number" id="f-days"></div>
            <div class="check-row">
                <label><input type="checkbox" id="f-trial"> Триал</label>
                <label><input type="checkbox" id="f-hidden"> Скрытый</label>
                <label><input type="checkbox" id="f-req-email"> Требовать Email</label>
                <label><input type="checkbox" id="f-req-phone"> Требовать телефон</label>
            </div>
            <button class="btn" onclick="saveTariff()">Сохранить</button>
            <button class="btn" style="background:var(--hint)" onclick="closeTariffForm()">Отмена</button>
        </div>
    </div>

    <div id="section-users" class="section"><h2>Пользователи</h2><div id="users-list"></div></div>

    <div id="section-broadcast" class="section">
        <h2>Рассылка</h2>
        <div class="form-group"><label>Текст</label><textarea id="b-text" rows="4"></textarea></div>
        <div class="form-group">
            <label>Кому</label>
            <select id="b-target">
                <option value="all">Всем</option>
                <option value="active">Активным</option>
                <option value="expiring">Истекающим (3 дня)</option>
            </select>
        </div>
        <button class="btn" onclick="runAction('broadcast', {text:document.getElementById('b-text').value, target:document.getElementById('b-target').value})">Отправить</button>
    </div>

    <div id="section-settings" class="section">
        <h2>Настройки</h2>
        <div class="form-group">
            <label>Способ оплаты</label>
            <select id="s-payment-mode" onchange="toggleSettingsFields()">
                <option value="mock">Тестовый (Mock)</option>
                <option value="yoomoney">YooMoney (P2P)</option>
                <option value="yookassa">YooKassa (API)</option>
                <option value="sberbank">Сбербанк (API)</option>
            </select>
        </div>
        <div id="yoomoney-fields" class="form-group">
            <label>Номер кошелька YooMoney</label>
            <input type="text" id="s-yoo-receiver" placeholder="41001XXXXXXXXXXXX">
        </div>
        <div id="yookassa-fields" class="form-group">
            <label>YooKassa Shop ID</label>
            <input type="text" id="s-yk-shop-id">
            <label>YooKassa Secret Key</label>
            <input type="password" id="s-yk-secret">
        </div>
        <div id="sberbank-fields" class="form-group">
            <label>Сбербанк Username</label>
            <input type="text" id="s-sb-username">
            <label>Сбербанк Password</label>
            <input type="password" id="s-sb-password">
        </div>
        <button class="btn" onclick="saveSettings()">Сохранить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showLoading(s) {
            document.getElementById('loading-overlay').style.display = s ? 'flex' : 'none';
        }

        function toggleSettingsFields() {
            const mode = document.getElementById('s-payment-mode').value;
            document.getElementById('yoomoney-fields').style.display = (mode === 'yoomoney') ? 'block' : 'none';
            document.getElementById('yookassa-fields').style.display = (mode === 'yookassa') ? 'block' : 'none';
            document.getElementById('sberbank-fields').style.display = (mode === 'sberbank') ? 'block' : 'none';
        }

        async function switchSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            if (btn) btn.classList.add('active');
            if (id === 'dashboard') loadStats();
            if (id === 'resources') loadResources();
            if (id === 'tariffs') loadTariffs();
            if (id === 'users') loadUsers();
            if (id === 'settings') loadSettings();
        }

        async function loadStats() {
            showLoading(true);
            try {
                const res = await fetch('/twa/stats');
                const d = await res.json();
                document.getElementById('stat-revenue').innerText = d.monthly_revenue || '0 ₽';
                document.getElementById('stat-new-users').innerText = d.new_users || '0';
                document.getElementById('stat-active').innerText = d.active_subscriptions || '0';
                document.getElementById('stat-total').innerText = d.total_users || '0';
            } catch (e) {}
            showLoading(false);
        }

        async function loadResources() {
            showLoading(true);
            const cont = document.getElementById('resources-list');
            cont.innerHTML = "";
            try {
                const res = await fetch('/twa/managed-chats');
                const chats = await res.json();
                chats.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    if (!c.is_active) item.style.opacity = "0.5";
                    let statusHtml = c.permissions_ok
                        ? `<div class="alert alert-success">✅ Права в порядке.</div>`
                        : `<div class="alert alert-danger">⚠️ Нужно: ${c.missing_permissions || 'проверить права'}</div>`;
                    if (!c.is_active) statusHtml = `<div class="alert alert-danger">❌ Бот удален или нет прав администратора.</div>`;
                    item.innerHTML = `<div class="list-header"><div class="list-item-title">${c.title}</div><div class="list-item-subtitle">ID: ${c.chat_id}</div></div>${statusHtml}`;
                    cont.appendChild(item);
                });
            } catch (e) {}
            showLoading(false);
        }

        async function addResource() {
            const id = document.getElementById('add-chat-id').value;
            if (!id) return;
            await runAction('add_resource', {chat_id: id});
            document.getElementById('add-chat-id').value = "";
        }

        async function loadTariffs() {
            showLoading(true);
            const cont = document.getElementById('tariffs-list');
            cont.innerHTML = "";
            try {
                const res = await fetch('/twa/tariffs');
                const ts = await res.json();
                ts.forEach(t => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `<div class="list-header"><div><b>${t.name}</b><br>${t.price} ₽</div>
                        <div style="display:flex; gap:5px;"><button class="action-btn" onclick='editTariff(${JSON.stringify(t)})'>🖉</button>
                        <button class="action-btn danger" onclick="deleteTariff(${t.id})">✕</button></div></div>`;
                    cont.appendChild(item);
                });
            } catch (e) {}
            showLoading(false);
        }

        async function loadUsers() {
            showLoading(true);
            const cont = document.getElementById('users-list');
            cont.innerHTML = "";
            try {
                const res = await fetch('/twa/users');
                const us = await res.json();
                us.forEach(u => {
                    const item = document.createElement('div');
                    item.className = 'list-item' + (u.is_admin ? ' admin' : '');
                    let actions = `<button class="action-btn danger" onclick="kickUser(${u.telegram_id}, '${u.username}')">KICK</button>`;
                    if (u.is_super) {
                        actions = `<span style="font-size:10px; color:var(--hint)">SUPER ADMIN</span>`;
                    } else if (u.is_admin) {
                        actions += `<button class="action-btn" onclick="runAction('demote_admin', {target_id: ${u.telegram_id}})">СНЯТЬ АДМИНА</button>`;
                    } else {
                        actions += `<button class="action-btn" onclick="runAction('promote_admin', {target_id: ${u.telegram_id}})">СДЕЛАТЬ АДМИНОМ</button>`;
                    }
                    item.innerHTML = `<div class="list-header"><div class="list-item-title">${u.is_admin ? '👑 ' : ''}${u.username}</div><div>${u.has_active_sub ? '✅' : '❌'}</div></div><div style="display:flex; gap:8px;">${actions}</div>`;
                    cont.appendChild(item);
                });
            } catch (e) {}
            showLoading(false);
        }

        function kickUser(id, username) {
            const r = prompt(`Выгнать @${username}? Причина:`, "Нарушение правил");
            if (r !== null) runAction('kick_user', {target_id: id, reason: r});
        }

        async function loadSettings() {
            showLoading(true);
            try {
                const res = await fetch('/twa/settings');
                const d = await res.json();
                document.getElementById('s-payment-mode').value = d.payment_mode || 'mock';
                document.getElementById('s-yoo-receiver').value = d.yoomoney_receiver || '';
                document.getElementById('s-yk-shop-id').value = d.yookassa_shop_id || '';
                document.getElementById('s-yk-secret').value = d.yookassa_secret_key || '';
                document.getElementById('s-sb-username').value = d.sberbank_username || '';
                document.getElementById('s-sb-password').value = d.sberbank_password || '';
                toggleSettingsFields();
            } catch (e) {}
            showLoading(false);
        }

        async function saveSettings() {
            showLoading(true);
            const data = {
                payment_mode: document.getElementById('s-payment-mode').value,
                yoomoney_receiver: document.getElementById('s-yoo-receiver').value,
                yookassa_shop_id: document.getElementById('s-yk-shop-id').value,
                yookassa_secret_key: document.getElementById('s-yk-secret').value,
                sberbank_username: document.getElementById('s-sb-username').value,
                sberbank_password: document.getElementById('s-sb-password').value
            };
            await fetch('/twa/settings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            tg.showAlert("Сохранено!");
            showLoading(false);
        }

        function openTariffForm() {
            document.getElementById('tariff-form').style.display = 'block';
        }

        function closeTariffForm() {
            document.getElementById('tariff-form').style.display = 'none';
        }

        async function saveTariff() {
            const data = {
                id: document.getElementById('f-id').value || null,
                name: document.getElementById('f-name').value,
                price: document.getElementById('f-price').value,
                duration_days: document.getElementById('f-days').value,
                is_trial: document.getElementById('f-trial').checked,
                is_hidden: document.getElementById('f-hidden').checked,
                require_email: document.getElementById('f-req-email').checked,
                require_phone: document.getElementById('f-req-phone').checked
            };
            showLoading(true);
            await fetch('/twa/tariffs', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            closeTariffForm();
            loadTariffs();
            showLoading(false);
        }

        async function deleteTariff(id) {
            if (confirm("Удалить?")) {
                showLoading(true);
                await fetch(`/twa/tariffs/${id}`, { method: 'DELETE' });
                loadTariffs();
                showLoading(false);
            }
        }

        async function runAction(action, data = {}) {
            showLoading(true);
            const res = await fetch('/twa/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, ...data})
            });
            const r = await res.json();
            tg.showAlert(r.message || 'Готово');
            if (action === 'sync_resources' || action === 'add_resource') loadResources();
            if (['promote_admin', 'demote_admin', 'kick_user'].includes(action)) loadUsers();
            showLoading(false);
        }

        function editTariff(t) {
            openTariffForm();
            document.getElementById('f-id').value = t.id;
            document.getElementById('f-name').value = t.name;
            document.getElementById('f-price').value = t.price;
            document.getElementById('f-days').value = t.duration_days;
            document.getElementById('f-trial').checked = !!t.is_trial;
            document.getElementById('f-hidden').checked = !!t.is_hidden;
            document.getElementById('f-req-email').checked = !!t.require_email;
            document.getElementById('f-req-phone').checked = !!t.require_phone;
        }

        loadStats();
    </script>
</body>
</html>
