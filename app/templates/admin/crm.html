<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Администратора</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #888);
            --button: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --danger: #e53935;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; }
        .nav-buttons { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
        .nav-btn { background: var(--secondary-bg); color: var(--text); border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; font-size: 14px; }
        .nav-btn.active { background: var(--button); color: var(--button-text); }
        .section { display: none; }
        .section.active { display: block; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--secondary-bg); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 12px; color: var(--hint); }
        .stat-card p { margin: 4px 0 0; font-size: 18px; font-weight: bold; }
        .btn { background: var(--button); color: var(--button-text); border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: 600; }
        .list-item { background: var(--secondary-bg); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid transparent; }
        .list-item.admin { border-left-color: var(--button); }
        .list-item-info { flex: 1; }
        .list-item-title { font-weight: bold; font-size: 14px; }
        .list-item-subtitle { font-size: 12px; color: var(--hint); }
        .list-item-actions { display: flex; gap: 8px; align-items: center; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; color: var(--hint); margin-bottom: 4px; }
        input, textarea, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .checkbox-group input { width: auto; }
        .kick-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.1); display: none; align-items: center; justify-content: center; z-index: 1000; font-size: 30px; }
    </style>
</head>
<body>
    <div id="loading-overlay">⌛</div>
    <div class="nav-buttons">
        <button class="nav-btn active" onclick="switchSection('dashboard', this)">Дашборд</button>
        <button class="nav-btn" onclick="switchSection('tariffs', this)">Тарифы</button>
        <button class="nav-btn" onclick="switchSection('users', this)">Пользователи</button>
        <button class="nav-btn" onclick="switchSection('broadcast', this)">Рассылка</button>
        <button class="nav-btn" onclick="switchSection('settings', this)">Настройки</button>
    </div>

    <!-- DASHBOARD -->
    <div id="section-dashboard" class="section active">
        <h2>Дашборд</h2>
        <div class="dashboard">
            <div class="stat-card"><h3>Доход (мес)</h3><p id="stat-revenue">0 ₽</p></div>
            <div class="stat-card"><h3>Новые юзеры</h3><p id="stat-new-users">0</p></div>
            <div class="stat-card"><h3>Активные</h3><p id="stat-active">0</p></div>
            <div class="stat-card"><h3>Всего</h3><p id="stat-total">0</p></div>
        </div>
        <button class="btn" onclick="runAction('export_csv')">Выгрузить CSV</button>
    </div>

    <!-- TARIFFS -->
    <div id="section-tariffs" class="section">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Тарифы</h2><button class="nav-btn active" onclick="openTariffForm()">+</button>
        </div>
        <div id="tariffs-list"></div>
        <div id="tariff-form" style="display:none; border-top: 1px solid #ccc; padding-top: 10px; margin-top: 10px;">
            <h3 id="tariff-form-title">Новый тариф</h3>
            <input type="hidden" id="f-id">
            <div class="form-group"><label>Название</label><input type="text" id="f-name"></div>
            <div class="form-group"><label>Цена (руб)</label><input type="number" id="f-price"></div>
            <div class="form-group"><label>Длительность (дней, 0=вечно)</label><input type="number" id="f-days"></div>
            <div class="form-group"><label>Описание</label><textarea id="f-desc"></textarea></div>
            <div class="checkbox-group"><input type="checkbox" id="f-trial"> <label>Пробный (Trial)</label></div>
            <div class="checkbox-group"><input type="checkbox" id="f-hidden"> <label>Скрыть (Hidden)</label></div>
            <div class="checkbox-group"><input type="checkbox" id="f-email"> <label>Требовать Email</label></div>
            <div class="checkbox-group"><input type="checkbox" id="f-phone"> <label>Требовать Телефон</label></div>
            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <button class="btn" onclick="saveTariff()">Сохранить</button>
                <button class="btn" style="background:var(--hint)" onclick="closeTariffForm()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- USERS -->
    <div id="section-users" class="section">
        <h2>Пользователи</h2>
        <div id="users-list"></div>
    </div>

    <!-- BROADCAST -->
    <div id="section-broadcast" class="section">
        <h2>Рассылка</h2>
        <div class="form-group"><label>Текст</label><textarea id="b-text" rows="4"></textarea></div>
        <div class="form-group"><label>Кому</label><select id="b-target"><option value="all">Всем</option><option value="active">Активным</option></select></div>
        <button class="btn" onclick="runAction('broadcast', {text:document.getElementById('b-text').value, target:document.getElementById('b-target').value})">Отправить</button>
    </div>

    <!-- SETTINGS -->
    <div id="section-settings" class="section">
        <h2>Настройки</h2>
        <div class="form-group">
            <label>Способ оплаты</label>
            <select id="s-payment-mode" onchange="toggleSettingsFields()">
                <option value="mock">Тестовый (Mock)</option>
                <option value="yoomoney">YooMoney (P2P)</option>
                <option value="yookassa">YooKassa (API)</option>
            </select>
        </div>
        <div id="yoomoney-fields" class="form-group">
            <label>Номер кошелька YooMoney</label>
            <input type="text" id="s-yoo-receiver" placeholder="41001XXXXXXXXXXXX">
        </div>
        <button class="btn" onclick="saveSettings()">Сохранить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function showLoading(s) { document.getElementById('loading-overlay').style.display = s?'flex':'none'; }
        
        function toggleSettingsFields() {
            const mode = document.getElementById('s-payment-mode').value;
            document.getElementById('yoomoney-fields').style.display = (mode === 'yoomoney') ? 'block' : 'none';
        }

        async function switchSection(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            if(btn) btn.classList.add('active');
            if(id==='dashboard') loadStats();
            if(id==='tariffs') loadTariffs();
            if(id==='users') loadUsers();
            if(id==='settings') loadSettings();
        }

        async function loadStats() {
            showLoading(true);
            try {
                const res = await fetch('/twa/stats');
                const d = await res.json();
                document.getElementById('stat-revenue').innerText = d.monthly_revenue;
                document.getElementById('stat-new-users').innerText = d.new_users;
                document.getElementById('stat-active').innerText = d.active_subscriptions;
                document.getElementById('stat-total').innerText = d.total_users;
            } catch(e) {}
            showLoading(false);
        }

        async function loadTariffs() {
            showLoading(true);
            const cont = document.getElementById('tariffs-list'); cont.innerHTML = "";
            try {
                const res = await fetch('/twa/tariffs');
                const ts = await res.json();
                ts.forEach(t => {
                    const item = document.createElement('div'); item.className = 'list-item';
                    item.innerHTML = `
                        <div class="list-item-info">
                            <div class="list-item-title">${t.name} ${t.is_hidden?'(Скрыт)':''}</div>
                            <div class="list-item-subtitle">${t.price} ₽ | ${t.duration_days || '∞'} дн.</div>
                        </div>
                        <div class="list-item-actions">
                            <button class="nav-btn small-btn" onclick='editTariff(${JSON.stringify(t)})'>🖉</button>
                            <button class="nav-btn small-btn btn-danger" onclick="deleteTariff(${t.id})">✕</button>
                        </div>
                    `;
                    cont.appendChild(item);
                });
            } catch(e) {}
            showLoading(false);
        }

        function openTariffForm() {
            document.getElementById('tariff-form').style.display = 'block';
            document.getElementById('tariffs-list').style.display = 'none';
            document.getElementById('tariff-form-title').innerText = "Новый тариф";
            document.getElementById('f-id').value = "";
            document.getElementById('f-name').value = "";
            document.getElementById('f-price').value = "";
            document.getElementById('f-days').value = "";
            document.getElementById('f-desc').value = "";
            document.getElementById('f-trial').checked = false;
            document.getElementById('f-hidden').checked = false;
            document.getElementById('f-email').checked = false;
            document.getElementById('f-phone').checked = false;
        }

        function editTariff(t) {
            openTariffForm();
            document.getElementById('tariff-form-title').innerText = "Правка тарифа";
            document.getElementById('f-id').value = t.id;
            document.getElementById('f-name').value = t.name;
            document.getElementById('f-price').value = t.price;
            document.getElementById('f-days').value = t.duration_days;
            document.getElementById('f-desc').value = t.description || "";
            document.getElementById('f-trial').checked = t.is_trial;
            document.getElementById('f-hidden').checked = t.is_hidden;
            document.getElementById('f-email').checked = t.require_email;
            document.getElementById('f-phone').checked = t.require_phone;
        }

        function closeTariffForm() {
            document.getElementById('tariff-form').style.display = 'none';
            document.getElementById('tariffs-list').style.display = 'block';
        }

        async function saveTariff() {
            const data = {
                id: document.getElementById('f-id').value,
                name: document.getElementById('f-name').value,
                price: document.getElementById('f-price').value,
                duration_days: document.getElementById('f-days').value,
                description: document.getElementById('f-desc').value,
                is_trial: document.getElementById('f-trial').checked,
                is_hidden: document.getElementById('f-hidden').checked,
                require_email: document.getElementById('f-email').checked,
                require_phone: document.getElementById('f-phone').checked
            };
            showLoading(true);
            try {
                await fetch('/twa/tariffs', { 
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify(data) 
                });
                closeTariffForm(); 
                loadTariffs();
            } catch(e) { tg.showAlert("Ошибка сохранения"); }
            showLoading(false);
        }

        async function loadUsers() {
            showLoading(true);
            const cont = document.getElementById('users-list'); cont.innerHTML = "";
            try {
                const res = await fetch('/twa/users');
                const us = await res.json();
                us.forEach(u => {
                    const item = document.createElement('div'); 
                    item.className = 'list-item' + (u.is_admin ? ' admin' : '');
                    item.innerHTML = `
                        <div class="list-item-info">
                            <div class="list-item-title">${u.is_admin?'👑 ':''}${u.username}</div>
                            <div class="list-item-subtitle">${u.has_active_sub?'✅ Активен':'❌ Нет'}</div>
                        </div>
                        <div class="list-item-actions">
                            ${!u.is_admin ? `<button class="kick-btn" onclick="kickUser(${u.telegram_id}, '${u.username}')">KICK</button>` : ''}
                        </div>
                    `;
                    cont.appendChild(item);
                });
            } catch(e) {}
            showLoading(false);
        }

        function kickUser(id, username) {
            tg.showPopup({
                title: 'Исключить пользователя',
                message: `Вы уверены, что хотите выгнать @${username}? Укажите причину:`,
                buttons: [
                    {id: 'cancel', type: 'cancel', text: 'Отмена'},
                    {id: 'kick', type: 'destructive', text: 'ВЫГНАТЬ'}
                ]
            }, (buttonId) => {
                if (buttonId === 'kick') {
                    const reason = prompt("Причина исключения:", "Нарушение правил сообщества");
                    if (reason !== null) {
                        runAction('kick_user', {target_id: id, reason: reason});
                    }
                }
            });
        }

        async function loadSettings() {
            showLoading(true);
            try {
                const res = await fetch('/twa/settings');
                const d = await res.json();
                document.getElementById('s-payment-mode').value = d.payment_mode || 'mock';
                document.getElementById('s-yoo-receiver').value = d.yoomoney_receiver || '';
                toggleSettingsFields();
            } catch(e) {}
            showLoading(false);
        }

        async function saveSettings() {
            const data = {
                payment_mode: document.getElementById('s-payment-mode').value,
                yoomoney_receiver: document.getElementById('s-yoo-receiver').value
            };
            showLoading(true);
            const res = await fetch('/twa/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            if((await res.json()).status === 'ok') tg.showAlert("Сохранено!");
            showLoading(false);
        }

        async function deleteTariff(id) {
            if(confirm("Удалить?")) {
                showLoading(true);
                await fetch(`/twa/tariffs/${id}`, { method:'DELETE' });
                loadTariffs(); showLoading(false);
            }
        }

        async function runAction(action, data={}) {
            showLoading(true);
            try {
                const res = await fetch('/twa/action', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action, ...data}) });
                const r = await res.json();
                tg.showAlert(r.message);
                if (action === 'kick_user') loadUsers();
            } catch(e) { tg.showAlert("Ошибка"); }
            showLoading(false);
        }

        loadStats();
    </script>
</body>
</html>
