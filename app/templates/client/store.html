<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина тарифов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #888);
            --link: var(--tg-theme-link-color, #2481cc);
            --button: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; }
        .header { margin-bottom: 20px; }
        .resources-box { background: var(--secondary-bg); padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
        .resources-box h3 { margin: 0 0 8px; font-size: 14px; color: var(--hint); text-transform: uppercase; }
        .res-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .tariff-card { border-radius: 12px; padding: 16px; margin-bottom: 16px; background: var(--secondary-bg); border: 1px solid rgba(0,0,0,0.05); }
        .tariff-name { font-size: 18px; font-weight: bold; }
        .tariff-price { font-size: 20px; font-weight: 800; color: var(--link); margin: 8px 0; }
        .btn { display: block; width: 100%; padding: 14px; text-align: center; background: var(--button); color: var(--button-text); border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .input-field { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: var(--bg); color: var(--text); box-sizing: border-box; margin-bottom: 10px; }
        .consent { font-size: 13px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Подписка</h2>
        <p>Получите доступ к закрытым ресурсам</p>
    </div>

    <div id="managed-resources" class="resources-box" style="display:none;">
        <h3>Вы получите доступ к:</h3>
        <div id="resources-list"></div>
    </div>

    <div id="tariffs-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function init() {
            try {
                const rRes = await fetch('/twa/managed-chats');
                const chats = await rRes.json();
                if (chats.length > 0) {
                    document.getElementById('managed-resources').style.display = 'block';
                    const list = document.getElementById('resources-list');
                    chats.forEach(c => {
                        const div = document.createElement('div');
                        div.className = 'res-item';
                        div.innerHTML = `🔹 <b>${c.title}</b>`;
                        list.appendChild(div);
                    });
                }
            } catch(e) {}

            try {
                const tRes = await fetch('/twa/tariffs');
                const tariffs = await tRes.json();
                const container = document.getElementById('tariffs-container');
                tariffs.filter(t => !t.is_hidden).forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'tariff-card';
                    card.innerHTML = `
                        <div class="tariff-name">${t.name}</div>
                        <div class="tariff-price">${t.price > 0 ? t.price + ' ₽' : 'Бесплатно'}</div>
                        ${t.require_email ? '<input type="email" id="email_'+t.id+'" class="input-field" placeholder="Email для чека">' : ''}
                        ${t.require_phone ? '<input type="tel" id="phone_'+t.id+'" class="input-field" placeholder="Телефон">' : ''}
                        <label class="consent"><input type="checkbox" id="consent_${t.id}"> <span>Я принимаю условия оферты и согласен(на) на обработку данных.</span></label>
                        <button class="btn" onclick="buyTariff(${t.id}, ${t.require_email}, ${t.require_phone})">Оформить</button>
                    `;
                    container.appendChild(card);
                });
            } catch(e) {}
        }

        async function buyTariff(id, reqEmail, reqPhone) {
            const consent = document.getElementById(`consent_${id}`);
            if (!consent || !consent.checked) {
                tg.showAlert('Нужно принять условия оферты');
                return;
            }

            const data = { action: "buy", tariff_id: id, user_id: tg.initDataUnsafe.user?.id };
            if (reqEmail) {
                const email = document.getElementById(`email_${id}`).value;
                if (!email) {
                    tg.showAlert("Введите Email");
                    return;
                }
                data.email = email;
            }
            if (reqPhone) {
                const phone = document.getElementById(`phone_${id}`).value;
                if (!phone) {
                    tg.showAlert("Введите телефон");
                    return;
                }
                data.phone = phone;
            }

            tg.MainButton.showProgress();
            try {
                const res = await fetch('/twa/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const r = await res.json();

                if (r.status !== 'ok') {
                    tg.showAlert(r.message || 'Ошибка операции');
                    return;
                }

                if (r.transaction_id && r.provider && r.tariff_id) {
                    tg.showAlert('Платеж создан. Ожидаем подтверждение...');
                    for (let attempt = 0; attempt < 6; attempt++) {
                        await new Promise(resolve => setTimeout(resolve, 5000));
                        const confirmRes = await fetch('/twa/payments/confirm', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                transaction_id: r.transaction_id,
                                user_id: data.user_id,
                                tariff_id: r.tariff_id,
                                provider: r.provider
                            })
                        });
                        const confirmData = await confirmRes.json();
                        if (confirmData.payment_status === 'success') {
                            tg.showAlert(confirmData.message || 'Оплата подтверждена');
                            tg.close();
                            return;
                        }
                    }
                    tg.showAlert('Платеж пока не подтвержден. Доступ будет выдан после подтверждения.');
                    return;
                }

                tg.showAlert(r.message || 'Операция завершена');
                tg.close();
            } catch(e) {
                tg.showAlert("Ошибка");
            } finally {
                tg.MainButton.hideProgress();
            }
        }

        init();
    </script>
</body>
</html>
