<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина тарифов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
        }
        .tariff-card {
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        .tariff-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .tariff-price {
            font-size: 16px;
            color: var(--tg-theme-link-color, #2481cc);
            margin-bottom: 8px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            text-align: center;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .input-field {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 4px;
            box-sizing: border-box;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
    </style>
</head>
<body>
    <h2>Доступные подписки</h2>
    <div id="tariffs-container">
        <!-- Tariffs will be loaded here -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function loadTariffs() {
            try {
                // In a real app, this would be an API call fetching from DB
                // const response = await fetch('/api/tariffs');
                // const tariffs = await response.json();
                
                // Mock data for initial rendering
                const tariffs = [
                    { id: 1, name: "Базовый (Месяц)", price: 500, require_email: false },
                    { id: 2, name: "PRO (Год)", price: 5000, require_email: true },
                    { id: 3, name: "Trial (3 дня)", price: 0, require_email: false, is_trial: true }
                ];
                
                const container = document.getElementById('tariffs-container');
                tariffs.forEach(t => {
                    const card = document.createElement('div');
                    card.className = 'tariff-card';
                    let html = `<div class="tariff-name">${t.name}</div>
                                <div class="tariff-price">${t.price > 0 ? t.price + ' руб.' : 'Бесплатно'}</div>`;
                    
                    if (t.require_email) {
                        html += `<input type="email" id="email_${t.id}" class="input-field" placeholder="Ваш Email (Обязательно)">`;
                    }
                    
                    html += `<button class="btn" onclick="buyTariff(${t.id}, ${t.require_email})">Оформить</button>`;
                    card.innerHTML = html;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error("Failed to load tariffs", e);
            }
        }

        function buyTariff(id, requireEmail) {
            let data = { tariff_id: id };
            if (requireEmail) {
                const email = document.getElementById(`email_${id}`).value;
                if (!email) {
                    tg.showAlert("Пожалуйста, введите Email");
                    return;
                }
                data.email = email;
            }
            
            // Send data back to bot
            tg.sendData(JSON.stringify({action: "buy", ...data}));
        }

        loadTariffs();
    </script>
</body>
</html>
